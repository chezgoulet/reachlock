name: CI

on:
  push:
    branches: [main, testing]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build, lint, test (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: System deps (Bevy on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libudev-dev libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - name: Postgres feature compiles
        run: cargo check -p reachlock-server --features postgres
      - name: Emit determinism manifest (x86_64)
        run: cargo run -p reachlock-cli -- determinism emit > manifest-x86_64.json
      - uses: actions/upload-artifact@v4
        with:
          name: manifest-x86_64
          path: manifest-x86_64.json

  wasm:
    name: WASM build (full plugin stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # The spike gate, kept green forever: bevy + rapier2d + lyon + audio
      # must compile for the web target (spec §2, WASM Build Risk).
      - run: cargo build -p reachlock-client --target wasm32-unknown-unknown

  determinism-arm:
    name: Determinism manifest (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Emit determinism manifest (aarch64)
        run: cargo run -p reachlock-cli -- determinism emit > manifest-aarch64.json
      - uses: actions/upload-artifact@v4
        with:
          name: manifest-aarch64
          path: manifest-aarch64.json

  determinism-wasi:
    name: Determinism manifest (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: bytecodealliance/actions/wasmtime/setup@v1
      - name: Emit determinism manifest (wasm32, under wasmtime)
        run: |
          cargo build -p reachlock-cli --target wasm32-wasip1 --release
          wasmtime run target/wasm32-wasip1/release/reachlock.wasm \
            determinism emit > manifest-wasm32.json
      - uses: actions/upload-artifact@v4
        with:
          name: manifest-wasm32
          path: manifest-wasm32.json

  determinism-compare:
    name: Cross-platform determinism gate (spec §5)
    needs: [test, determinism-arm, determinism-wasi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Manifests must be bit-identical across targets
        run: |
          set -e
          for other in manifest-aarch64.json manifest-wasm32.json; do
            if ! diff -u manifest-x86_64.json "$other"; then
              echo "::error::determinism divergence between x86_64 and $other"
              exit 1
            fi
          done
          echo "x86_64 == aarch64 == wasm32: bit-identical"
