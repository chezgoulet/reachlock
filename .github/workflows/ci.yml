name: CI

on:
  push:
    branches: [main, testing]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Go server (build, vet, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  godot:
    name: Godot project import
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.7-stable
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          ASSET="Godot_v${GODOT_VERSION}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${ASSET}.zip"
          unzip -q "${ASSET}.zip"
          sudo mv "${ASSET}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version
      - name: Import & validate project
        run: |
          set -o pipefail
          godot --headless --path godot/ --import 2>&1 | tee import.log
          if grep -qE "SCRIPT ERROR|Parse Error|ERROR:.*\.gd" import.log; then
            echo "::error::Godot import produced script/parse errors"
            exit 1
          fi
      # M5 gate: the in-engine trigger-DSL evaluator must match the Python
      # reference battery (scripts/trigger_dsl.py defines the semantics).
      - name: Trigger-DSL conformance bridge
        run: python3 scripts/check_dsl_bridge.py

  mod-data:
    name: Mod data JSON validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate mod JSON files parse
        run: python3 scripts/validate_mod_data.py

  architecture:
    name: Three-ring architecture guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-test the guard
        run: python3 scripts/check_architecture.py --self-test
      - name: Enforce engine has zero content
        run: python3 scripts/check_architecture.py

  # The cross-repo integration gate (Sprint 02 required deliverable): a real
  # `pan serve` subprocess driven through the full Soul Protocol lifecycle
  # plus every error path, with the 15 shared fixtures as expected traffic.
  # A PR that breaks this is not reviewed — it is rejected.
  # Runs after the unit-level jobs; see tests/soul-protocol-harness/README.md.
  soul-protocol-harness:
    name: Soul Protocol integration harness
    runs-on: ubuntu-latest
    needs: [server, mod-data, architecture]
    steps:
      - uses: actions/checkout@v4
        with:
          path: reachlock
      # The mind daemon lives in its own repo; the harness drives the real
      # binary. `testing` is the actively-worked branch on both repos.
      # (If chezgoulet/pan is private, give this checkout a PAT via
      # `token:` — the default GITHUB_TOKEN only reaches this repo.)
      - uses: actions/checkout@v4
        with:
          repository: chezgoulet/pan
          ref: testing
          path: pan
      - name: Build pan
        working-directory: pan
        run: cargo build --bin pan
      - name: Run the harness
        working-directory: reachlock
        run: python3 tests/soul-protocol-harness/run_harness.py --pan-bin ../pan/target/debug/pan
