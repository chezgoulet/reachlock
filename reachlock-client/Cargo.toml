[package]
name = "reachlock-client"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
reachlock-core = { path = "../reachlock-core" }
# "wav" lets the spike play a procedurally generated tone (spec §5,
# generate_music) — the generator emits raw PCM, the bridge wraps it in a
# WAV header for bevy_audio's decoder.
bevy = { workspace = true, features = ["wav"] }
bevy_prototype_lyon = { workspace = true }
bevy_rapier2d = { workspace = true }
